            	ReportInstanceInfo(ctx context.Context, in *ReportInstanceInfoRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Check if a notebook instance is upgradable.
            	IsInstanceUpgradeable(ctx context.Context, in *IsInstanceUpgradeableRequest, opts ...grpc.CallOption) (*IsInstanceUpgradeableResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Check if a notebook instance is healthy.
            	GetInstanceHealth(ctx context.Context, in *GetInstanceHealthRequest, opts ...grpc.CallOption) (*GetInstanceHealthResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
