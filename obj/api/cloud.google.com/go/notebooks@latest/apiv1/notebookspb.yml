    - uid: cloud.google.com/go/notebooks/apiv1/notebookspb.RuntimeSoftwareConfig
      name: RuntimeSoftwareConfig
      id: RuntimeSoftwareConfig
      summary: |
        Specifies the selection and configuration of software inside the runtime.
        The properties to set on runtime.
        Properties keys are specified in `key:value` format, for example:

        * `idle_shutdown: true`
        * `idle_shutdown_timeout: 180`
        * `enable_health_monitoring: true`
      parent: cloud.google.com/go/notebooks/apiv1/notebookspb
      type: type
      langs:
        - go
      syntax:
        content: |-
            type RuntimeSoftwareConfig struct {

