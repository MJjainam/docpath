    - uid: cloud.google.com/go/notebooks/apiv1/notebookspb.DiagnosticConfig
      name: DiagnosticConfig
      id: DiagnosticConfig
      summary: |
        Defines flags that are used to run the diagnostic tool
      parent: cloud.google.com/go/notebooks/apiv1/notebookspb
      type: type
      langs:
        - go
      syntax:
        content: |-
            type DiagnosticConfig struct {

            	// Required. User Cloud Storage bucket location (REQUIRED).
            	// Must be formatted with path prefix (`gs://$GCS_BUCKET`).
            	//
            	// Permissions:
            	// User Managed Notebooks:
            	//   - storage.buckets.writer: Must be given to the project's service account
            	//     attached to VM.
            	//
            	// Google Managed Notebooks:
            	//   - storage.buckets.writer: Must be given to the project's service account or
            	//     user credentials attached to VM depending on authentication mode.
            	//
            	// Cloud Storage bucket Log file will be written to
            	// `gs://$GCS_BUCKET/$RELATIVE_PATH/$VM_DATE_$TIME.tar.gz`
            	GcsBucket <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,1,opt,name=gcs_bucket,json=gcsBucket,proto3" json:"gcs_bucket,omitempty"`
            	// Optional. Defines the relative storage path in the Cloud Storage bucket
            	// where the diagnostic logs will be written: Default path will be the root
            	// directory of the Cloud Storage bucket
            	// (`gs://$GCS_BUCKET/$DATE_$TIME.tar.gz`)
            	// Example of full path where Log file will be written:
            	// `gs://$GCS_BUCKET/$RELATIVE_PATH/`
            	RelativePath <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,2,opt,name=relative_path,json=relativePath,proto3" json:"relative_path,omitempty"`
            	// Optional. Enables flag to repair service for instance
            	RepairFlagEnabled <a href="https://pkg.go.dev/builtin#bool">bool</a> `protobuf:"varint,3,opt,name=repair_flag_enabled,json=repairFlagEnabled,proto3" json:"repair_flag_enabled,omitempty"`
            	// Optional. Enables flag to capture packets from the instance for 30 seconds
            	PacketCaptureFlagEnabled <a href="https://pkg.go.dev/builtin#bool">bool</a> `protobuf:"varint,4,opt,name=packet_capture_flag_enabled,json=packetCaptureFlagEnabled,proto3" json:"packet_capture_flag_enabled,omitempty"`
            	// Optional. Enables flag to copy all `/home/jupyter` folder contents
            	CopyHomeFilesFlagEnabled <a href="https://pkg.go.dev/builtin#bool">bool</a> `protobuf:"varint,5,opt,name=copy_home_files_flag_enabled,json=copyHomeFilesFlagEnabled,proto3" json:"copy_home_files_flag_enabled,omitempty"`
            	// contains filtered or unexported fields
            }
