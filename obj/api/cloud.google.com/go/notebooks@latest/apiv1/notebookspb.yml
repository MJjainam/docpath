    - uid: cloud.google.com/go/notebooks/apiv1/notebookspb.VirtualMachineConfig
      name: VirtualMachineConfig
      id: VirtualMachineConfig
      summary: |
        The config settings for virtual machine.
      parent: cloud.google.com/go/notebooks/apiv1/notebookspb
      type: type
      langs:
        - go
      syntax:
        content: |-
            type VirtualMachineConfig struct {

            	// Output only. The zone where the virtual machine is located.
            	// If using regional request, the notebooks service will pick a location
            	// in the corresponding runtime region.
            	// On a get request, zone will always be present. Example:
            	// * `us-central1-b`
            	Zone <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,1,opt,name=zone,proto3" json:"zone,omitempty"`
            	// Required. The Compute Engine machine type used for runtimes.
            	// Short name is valid. Examples:
            	// * `n1-standard-2`
            	// * `e2-standard-8`
            	MachineType <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,2,opt,name=machine_type,json=machineType,proto3" json:"machine_type,omitempty"`
            	// Optional. Use a list of container images to use as Kernels in the notebook instance.
            	ContainerImages []*ContainerImage `protobuf:"bytes,3,rep,name=container_images,json=containerImages,proto3" json:"container_images,omitempty"`
            	// Required. Data disk option configuration settings.
            	DataDisk *<a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_LocalDisk">LocalDisk</a> `protobuf:"bytes,4,opt,name=data_disk,json=dataDisk,proto3" json:"data_disk,omitempty"`
            	// Optional. Encryption settings for virtual machine data disk.
            	EncryptionConfig *<a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_EncryptionConfig">EncryptionConfig</a> `protobuf:"bytes,5,opt,name=encryption_config,json=encryptionConfig,proto3" json:"encryption_config,omitempty"`
            	// Optional. Shielded VM Instance configuration settings.
            	ShieldedInstanceConfig *<a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_RuntimeShieldedInstanceConfig">RuntimeShieldedInstanceConfig</a> `protobuf:"bytes,6,opt,name=shielded_instance_config,json=shieldedInstanceConfig,proto3" json:"shielded_instance_config,omitempty"`
            	// Optional. The Compute Engine accelerator configuration for this runtime.
            	AcceleratorConfig *<a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_RuntimeAcceleratorConfig">RuntimeAcceleratorConfig</a> `protobuf:"bytes,7,opt,name=accelerator_config,json=acceleratorConfig,proto3" json:"accelerator_config,omitempty"`
            	// Optional. The Compute Engine network to be used for machine
            	// communications. Cannot be specified with subnetwork. If neither
            	// `network` nor `subnet` is specified, the "default" network of
            	// the project is used, if it exists.
            	//
            	// A full URL or partial URI. Examples:
            	//
            	// * `https://www.googleapis.com/compute/v1/projects/[project_id]/global/networks/default`
            	// * `projects/[project_id]/global/networks/default`
            	//
            	// Runtimes are managed resources inside Google Infrastructure.
            	// Runtimes support the following network configurations:
            	//
            	// * Google Managed Network (Network & subnet are empty)
            	// * Consumer Project VPC (network & subnet are required). Requires
            	// configuring Private Service Access.
            	// * Shared VPC (network & subnet are required). Requires configuring Private
            	// Service Access.
            	Network <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,8,opt,name=network,proto3" json:"network,omitempty"`
            	// Optional. The Compute Engine subnetwork to be used for machine
            	// communications. Cannot be specified with network.
            	//
            	// A full URL or partial URI are valid. Examples:
            	//
            	// * `https://www.googleapis.com/compute/v1/projects/[project_id]/regions/us-east1/subnetworks/sub0`
            	// * `projects/[project_id]/regions/us-east1/subnetworks/sub0`
            	Subnet <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,9,opt,name=subnet,proto3" json:"subnet,omitempty"`
            	// Optional. If true, runtime will only have internal IP
            	// addresses. By default, runtimes are not restricted to internal IP
            	// addresses, and will have ephemeral external IP addresses assigned to each
            	// vm. This `internal_ip_only` restriction can only be enabled for
            	// subnetwork enabled networks, and all dependencies must be
            	// configured to be accessible without external IP addresses.
            	InternalIpOnly <a href="https://pkg.go.dev/builtin#bool">bool</a> `protobuf:"varint,10,opt,name=internal_ip_only,json=internalIpOnly,proto3" json:"internal_ip_only,omitempty"`
            	// Optional. The Compute Engine tags to add to runtime (see [Tagging
            	// instances](https://cloud.google.com/compute/docs/label-or-tag-resources#tags)).
            	Tags []<a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,13,rep,name=tags,proto3" json:"tags,omitempty"`
            	// Output only. The Compute Engine guest attributes. (see
            	// [Project and instance
            	// guest
            	// attributes](https://cloud.google.com/compute/docs/storing-retrieving-metadata#guest_attributes)).
            	GuestAttributes map[<a href="https://pkg.go.dev/builtin#string">string</a>]<a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,14,rep,name=guest_attributes,json=guestAttributes,proto3" json:"guest_attributes,omitempty" protobuf_key:"bytes,1,opt,name=key" protobuf_val:"bytes,2,opt,name=value"`
            	// Optional. The Compute Engine metadata entries to add to virtual machine. (see
            	// [Project and instance
            	// metadata](https://cloud.google.com/compute/docs/storing-retrieving-metadata#project_and_instance_metadata)).
            	Metadata map[<a href="https://pkg.go.dev/builtin#string">string</a>]<a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,15,rep,name=metadata,proto3" json:"metadata,omitempty" protobuf_key:"bytes,1,opt,name=key" protobuf_val:"bytes,2,opt,name=value"`
            	// Optional. The labels to associate with this runtime.
            	// Label **keys** must contain 1 to 63 characters, and must conform to
            	// [RFC 1035](https://www.ietf.org/rfc/rfc1035.txt).
            	// Label **values** may be empty, but, if present, must contain 1 to 63
            	// characters, and must conform to [RFC
            	// 1035](https://www.ietf.org/rfc/rfc1035.txt). No more than 32 labels can be
            	// associated with a cluster.
            	Labels map[<a href="https://pkg.go.dev/builtin#string">string</a>]<a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,16,rep,name=labels,proto3" json:"labels,omitempty" protobuf_key:"bytes,1,opt,name=key" protobuf_val:"bytes,2,opt,name=value"`
            	// Optional. The type of vNIC to be used on this interface. This may be gVNIC or
            	// VirtioNet.
            	NicType <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_VirtualMachineConfig_NicType">VirtualMachineConfig_NicType</a> `protobuf:"varint,17,opt,name=nic_type,json=nicType,proto3,enum=google.cloud.notebooks.v1.VirtualMachineConfig_NicType" json:"nic_type,omitempty"`
            	// Optional. Reserved IP Range name is used for VPC Peering.
            	// The subnetwork allocation will use the range *name* if it's assigned.
            	//
            	// Example: managed-notebooks-range-c
            	//
            	//	PEERING_RANGE_NAME_3=managed-notebooks-range-c
            	//	gcloud compute addresses create $PEERING_RANGE_NAME_3 \
            	//	  --global \
            	//	  --prefix-length=24 \
            	//	  --description="Google Cloud Managed Notebooks Range 24 c" \
            	//	  --network=$NETWORK \
            	//	  --addresses=192.168.0.0 \
            	//	  --purpose=VPC_PEERING
            	//
            	// Field value will be: `managed-notebooks-range-c`
            	ReservedIpRange <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,18,opt,name=reserved_ip_range,json=reservedIpRange,proto3" json:"reserved_ip_range,omitempty"`
            	// Optional. Boot image metadata used for runtime upgradeability.
            	BootImage *<a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_VirtualMachineConfig_BootImage">VirtualMachineConfig_BootImage</a> `protobuf:"bytes,19,opt,name=boot_image,json=bootImage,proto3" json:"boot_image,omitempty"`
            	// contains filtered or unexported fields
            }
