            type NotebookServiceClient interface {
            	// Lists instances in a given project and location.
            	ListInstances(ctx context.Context, in *ListInstancesRequest, opts ...grpc.CallOption) (*ListInstancesResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Gets details of a single Instance.
            	GetInstance(ctx context.Context, in *GetInstanceRequest, opts ...grpc.CallOption) (*Instance, <a href="https://pkg.go.dev/builtin#error">error</a>)
