            const (
            	// State is not specified.
            	Runtime_STATE_UNSPECIFIED <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_State">Runtime_State</a> = 0
            	// The compute layer is starting the runtime. It is not ready for use.
            	Runtime_STARTING <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_State">Runtime_State</a> = 1
            	// The compute layer is installing required frameworks and registering the
