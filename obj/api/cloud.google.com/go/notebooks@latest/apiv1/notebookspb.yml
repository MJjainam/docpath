            	Runtime_PROVISIONING <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_State">Runtime_State</a> = 2
            	// The runtime is currently running. It is ready for use.
            	Runtime_ACTIVE <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_State">Runtime_State</a> = 3
            	// The control logic is stopping the runtime. It cannot be used.
            	Runtime_STOPPING <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_State">Runtime_State</a> = 4
            	// The runtime is stopped. It cannot be used.
            	Runtime_STOPPED <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_State">Runtime_State</a> = 5
            	// The runtime is being deleted. It cannot be used.
            	Runtime_DELETING <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_State">Runtime_State</a> = 6
            	// The runtime is upgrading. It cannot be used.
            	Runtime_UPGRADING <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_State">Runtime_State</a> = 7
            	// The runtime is being created and set up. It is not ready for use.
            	Runtime_INITIALIZING <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_State">Runtime_State</a> = 8
            )
