      summary: |
        NotebookServiceServer is the server API for NotebookService service.
        All implementations should embed UnimplementedNotebookServiceServer
        for forward compatibility
      parent: cloud.google.com/go/notebooks/apiv1/notebookspb
      type: type
      langs:
        - go
      syntax:
        content: |-
            type NotebookServiceServer interface {
            	// Lists instances in a given project and location.
            	ListInstances(context.Context, *ListInstancesRequest) (*ListInstancesResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Gets details of a single Instance.
            	GetInstance(context.Context, *GetInstanceRequest) (*Instance, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Creates a new Instance in a given project and location.
            	CreateInstance(context.Context, *CreateInstanceRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Registers an existing legacy notebook instance to the Notebooks API server.
            	// Legacy instances are instances created with the legacy Compute Engine
            	// calls. They are not manageable by the Notebooks API out of the box. This
            	// call makes these instances manageable by the Notebooks API.
            	RegisterInstance(context.Context, *RegisterInstanceRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Updates the guest accelerators of a single Instance.
            	SetInstanceAccelerator(context.Context, *SetInstanceAcceleratorRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Updates the machine type of a single Instance.
            	SetInstanceMachineType(context.Context, *SetInstanceMachineTypeRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Update Notebook Instance configurations.
            	UpdateInstanceConfig(context.Context, *UpdateInstanceConfigRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Updates the Shielded instance configuration of a single Instance.
            	UpdateShieldedInstanceConfig(context.Context, *UpdateShieldedInstanceConfigRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Replaces all the labels of an Instance.
            	SetInstanceLabels(context.Context, *SetInstanceLabelsRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Add/update metadata items for an instance.
            	UpdateInstanceMetadataItems(context.Context, *UpdateInstanceMetadataItemsRequest) (*UpdateInstanceMetadataItemsResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Deletes a single Instance.
            	DeleteInstance(context.Context, *DeleteInstanceRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Starts a notebook instance.
            	StartInstance(context.Context, *StartInstanceRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Stops a notebook instance.
            	StopInstance(context.Context, *StopInstanceRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Resets a notebook instance.
            	ResetInstance(context.Context, *ResetInstanceRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Allows notebook instances to
            	// report their latest instance information to the Notebooks
            	// API server. The server will merge the reported information to
            	// the instance metadata store. Do not use this method directly.
            	ReportInstanceInfo(context.Context, *ReportInstanceInfoRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Check if a notebook instance is upgradable.
            	IsInstanceUpgradeable(context.Context, *IsInstanceUpgradeableRequest) (*IsInstanceUpgradeableResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Check if a notebook instance is healthy.
            	GetInstanceHealth(context.Context, *GetInstanceHealthRequest) (*GetInstanceHealthResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Upgrades a notebook instance to the latest version.
            	UpgradeInstance(context.Context, *UpgradeInstanceRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Rollbacks a notebook instance to the previous version.
            	RollbackInstance(context.Context, *RollbackInstanceRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Creates a Diagnostic File and runs Diagnostic Tool given an Instance.
            	DiagnoseInstance(context.Context, *DiagnoseInstanceRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Allows notebook instances to
            	// call this endpoint to upgrade themselves. Do not use this method directly.
            	UpgradeInstanceInternal(context.Context, *UpgradeInstanceInternalRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Lists environments in a project.
            	ListEnvironments(context.Context, *ListEnvironmentsRequest) (*ListEnvironmentsResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Gets details of a single Environment.
