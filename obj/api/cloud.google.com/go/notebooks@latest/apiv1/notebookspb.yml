            	Runtime_HEALTH_STATE_UNSPECIFIED <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_HealthState">Runtime_HealthState</a> = 0
            	// The runtime is known to be in an healthy state
            	// (for example, critical daemons are running)
            	// Applies to ACTIVE state.
            	Runtime_HEALTHY <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_HealthState">Runtime_HealthState</a> = 1
            	// The runtime is known to be in an unhealthy state
            	// (for example, critical daemons are not running)
            	// Applies to ACTIVE state.
            	Runtime_UNHEALTHY <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_HealthState">Runtime_HealthState</a> = 2
            	// The runtime has not installed health monitoring agent.
            	// Applies to ACTIVE state.
            	Runtime_AGENT_NOT_INSTALLED <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_HealthState">Runtime_HealthState</a> = 3
            	// The runtime health monitoring agent is not running.
            	// Applies to ACTIVE state.
            	Runtime_AGENT_NOT_RUNNING <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Runtime_HealthState">Runtime_HealthState</a> = 4
            )
