    - uid: cloud.google.com/go/notebooks/apiv1/notebookspb.Instance
      name: Instance
      id: Instance
      summary: |
        The definition of a notebook instance.
      parent: cloud.google.com/go/notebooks/apiv1/notebookspb
      type: type
      langs:
        - go
      syntax:
        content: |-
            type Instance struct {

            	// Output only. The name of this notebook instance. Format:
            	// `projects/{project_id}/locations/{location}/instances/{instance_id}`
            	Name <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,1,opt,name=name,proto3" json:"name,omitempty"`
            	// Type of the environment; can be one of VM image, or container image.
            	//
            	// Types that are valid to be assigned to Environment:
            	//
            	//	*Instance_VmImage
            	//	*Instance_ContainerImage
            	Environment isInstance_Environment `protobuf_oneof:"environment"`
            	// Path to a Bash script that automatically runs after a notebook instance
            	// fully boots up. The path must be a URL or
            	// Cloud Storage path (`gs://path-to-file/file-name`).
            	PostStartupScript <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,4,opt,name=post_startup_script,json=postStartupScript,proto3" json:"post_startup_script,omitempty"`
            	// Output only. The proxy endpoint that is used to access the Jupyter notebook.
            	ProxyUri <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,5,opt,name=proxy_uri,json=proxyUri,proto3" json:"proxy_uri,omitempty"`
            	// Input only. The owner of this instance after creation. Format: `alias@example.com`
            	//
            	// Currently supports one owner only. If not specified, all of the service
            	// account users of your VM instance's service account can use
            	// the instance.
            	InstanceOwners []<a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,6,rep,name=instance_owners,json=instanceOwners,proto3" json:"instance_owners,omitempty"`
            	// The service account on this instance, giving access to other Google
            	// Cloud services.
            	// You can use any service account within the same project, but you
            	// must have the service account user permission to use the instance.
            	//
            	// If not specified, the [Compute Engine default service
            	// account](https://cloud.google.com/compute/docs/access/service-accounts#default_service_account)
            	// is used.
            	ServiceAccount <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,7,opt,name=service_account,json=serviceAccount,proto3" json:"service_account,omitempty"`
            	// Optional. The URIs of service account scopes to be included in
            	// Compute Engine instances.
            	//
            	// If not specified, the following
            	// [scopes](https://cloud.google.com/compute/docs/access/service-accounts#accesscopesiam)
            	// are defined:
            	//   - https://www.googleapis.com/auth/cloud-platform
            	//   - https://www.googleapis.com/auth/userinfo.email
            	//
            	// If not using default scopes, you need at least:
            	//
            	//	https://www.googleapis.com/auth/compute
            	ServiceAccountScopes []<a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,31,rep,name=service_account_scopes,json=serviceAccountScopes,proto3" json:"service_account_scopes,omitempty"`
            	// Required. The [Compute Engine machine
            	// type](https://cloud.google.com/compute/docs/machine-types) of this
            	// instance.
            	MachineType <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,8,opt,name=machine_type,json=machineType,proto3" json:"machine_type,omitempty"`
            	// The hardware accelerator used on this instance. If you use
            	// accelerators, make sure that your configuration has
            	// [enough vCPUs and memory to support the `machine_type` you have
            	// selected](https://cloud.google.com/compute/docs/gpus/#gpus-list).
            	AcceleratorConfig *<a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Instance_AcceleratorConfig">Instance_AcceleratorConfig</a> `protobuf:"bytes,9,opt,name=accelerator_config,json=acceleratorConfig,proto3" json:"accelerator_config,omitempty"`
            	// Output only. The state of this instance.
            	State <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Instance_State">Instance_State</a> `protobuf:"varint,10,opt,name=state,proto3,enum=google.cloud.notebooks.v1.Instance_State" json:"state,omitempty"`
            	// Whether the end user authorizes Google Cloud to install GPU driver
            	// on this instance.
            	// If this field is empty or set to false, the GPU driver won't be installed.
            	// Only applicable to instances with GPUs.
            	InstallGpuDriver <a href="https://pkg.go.dev/builtin#bool">bool</a> `protobuf:"varint,11,opt,name=install_gpu_driver,json=installGpuDriver,proto3" json:"install_gpu_driver,omitempty"`
            	// Specify a custom Cloud Storage path where the GPU driver is stored.
            	// If not specified, we'll automatically choose from official GPU drivers.
            	CustomGpuDriverPath <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,12,opt,name=custom_gpu_driver_path,json=customGpuDriverPath,proto3" json:"custom_gpu_driver_path,omitempty"`
            	// Input only. The type of the boot disk attached to this instance, defaults to
            	// standard persistent disk (`PD_STANDARD`).
            	BootDiskType <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_Instance_DiskType">Instance_DiskType</a> `protobuf:"varint,13,opt,name=boot_disk_type,json=bootDiskType,proto3,enum=google.cloud.notebooks.v1.Instance_DiskType" json:"boot_disk_type,omitempty"`
            	// Input only. The size of the boot disk in GB attached to this instance, up to a maximum
