            	CreateEnvironment(context.Context, *CreateEnvironmentRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Deletes a single Environment.
            	DeleteEnvironment(context.Context, *DeleteEnvironmentRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Lists schedules in a given project and location.
            	ListSchedules(context.Context, *ListSchedulesRequest) (*ListSchedulesResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Gets details of schedule
            	GetSchedule(context.Context, *GetScheduleRequest) (*Schedule, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Deletes schedule and all underlying jobs
            	DeleteSchedule(context.Context, *DeleteScheduleRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Creates a new Scheduled Notebook in a given project and location.
            	CreateSchedule(context.Context, *CreateScheduleRequest) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Triggers execution of an existing schedule.
