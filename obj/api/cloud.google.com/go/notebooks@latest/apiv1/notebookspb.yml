            	CreateInstance(ctx context.Context, in *CreateInstanceRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Registers an existing legacy notebook instance to the Notebooks API server.
            	// Legacy instances are instances created with the legacy Compute Engine
            	// calls. They are not manageable by the Notebooks API out of the box. This
            	// call makes these instances manageable by the Notebooks API.
            	RegisterInstance(ctx context.Context, in *RegisterInstanceRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Updates the guest accelerators of a single Instance.
            	SetInstanceAccelerator(ctx context.Context, in *SetInstanceAcceleratorRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Updates the machine type of a single Instance.
            	SetInstanceMachineType(ctx context.Context, in *SetInstanceMachineTypeRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Update Notebook Instance configurations.
            	UpdateInstanceConfig(ctx context.Context, in *UpdateInstanceConfigRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Updates the Shielded instance configuration of a single Instance.
            	UpdateShieldedInstanceConfig(ctx context.Context, in *UpdateShieldedInstanceConfigRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Replaces all the labels of an Instance.
            	SetInstanceLabels(ctx context.Context, in *SetInstanceLabelsRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Add/update metadata items for an instance.
            	UpdateInstanceMetadataItems(ctx context.Context, in *UpdateInstanceMetadataItemsRequest, opts ...grpc.CallOption) (*UpdateInstanceMetadataItemsResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Deletes a single Instance.
            	DeleteInstance(ctx context.Context, in *DeleteInstanceRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Starts a notebook instance.
            	StartInstance(ctx context.Context, in *StartInstanceRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Stops a notebook instance.
            	StopInstance(ctx context.Context, in *StopInstanceRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
