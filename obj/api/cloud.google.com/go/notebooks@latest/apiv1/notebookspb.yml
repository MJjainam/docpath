            	ListRuntimes(ctx context.Context, in *ListRuntimesRequest, opts ...grpc.CallOption) (*ListRuntimesResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Gets details of a single Runtime. The location must be a regional endpoint
            	// rather than zonal.
            	GetRuntime(ctx context.Context, in *GetRuntimeRequest, opts ...grpc.CallOption) (*Runtime, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Creates a new Runtime in a given project and location.
            	CreateRuntime(ctx context.Context, in *CreateRuntimeRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Update Notebook Runtime configuration.
            	UpdateRuntime(ctx context.Context, in *UpdateRuntimeRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Deletes a single Runtime.
            	DeleteRuntime(ctx context.Context, in *DeleteRuntimeRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Starts a Managed Notebook Runtime.
            	// Perform "Start" on GPU instances; "Resume" on CPU instances
            	// See:
            	// https://cloud.google.com/compute/docs/instances/stop-start-instance
            	// https://cloud.google.com/compute/docs/instances/suspend-resume-instance
            	StartRuntime(ctx context.Context, in *StartRuntimeRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Stops a Managed Notebook Runtime.
            	// Perform "Stop" on GPU instances; "Suspend" on CPU instances
            	// See:
            	// https://cloud.google.com/compute/docs/instances/stop-start-instance
            	// https://cloud.google.com/compute/docs/instances/suspend-resume-instance
            	StopRuntime(ctx context.Context, in *StopRuntimeRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Switch a Managed Notebook Runtime.
            	SwitchRuntime(ctx context.Context, in *SwitchRuntimeRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Resets a Managed Notebook Runtime.
            	ResetRuntime(ctx context.Context, in *ResetRuntimeRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Upgrades a Managed Notebook Runtime to the latest version.
            	UpgradeRuntime(ctx context.Context, in *UpgradeRuntimeRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Report and process a runtime event.
            	ReportRuntimeEvent(ctx context.Context, in *ReportRuntimeEventRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Gets an access token for the consumer service account that the customer
            	// attached to the runtime. Only accessible from the tenant instance.
            	RefreshRuntimeTokenInternal(ctx context.Context, in *RefreshRuntimeTokenInternalRequest, opts ...grpc.CallOption) (*RefreshRuntimeTokenInternalResponse, <a href="https://pkg.go.dev/builtin#error">error</a>)
            	// Creates a Diagnostic File and runs Diagnostic Tool given a Runtime.
            	DiagnoseRuntime(ctx context.Context, in *DiagnoseRuntimeRequest, opts ...grpc.CallOption) (*longrunningpb.Operation, <a href="https://pkg.go.dev/builtin#error">error</a>)
            }
