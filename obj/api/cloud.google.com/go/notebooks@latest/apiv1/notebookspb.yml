    - uid: cloud.google.com/go/notebooks/apiv1/notebookspb.ExecutionTemplate
      name: ExecutionTemplate
      id: ExecutionTemplate
      summary: |
        The description a notebook execution workload.
      parent: cloud.google.com/go/notebooks/apiv1/notebookspb
      type: type
      langs:
        - go
      syntax:
        content: |-
            type ExecutionTemplate struct {

            	// Required. Scale tier of the hardware used for notebook execution.
            	// DEPRECATED Will be discontinued. As right now only CUSTOM is supported.
            	//
            	// Deprecated: Marked as deprecated in google/cloud/notebooks/v1/execution.proto.
            	ScaleTier <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_ExecutionTemplate_ScaleTier">ExecutionTemplate_ScaleTier</a> `protobuf:"varint,1,opt,name=scale_tier,json=scaleTier,proto3,enum=google.cloud.notebooks.v1.ExecutionTemplate_ScaleTier" json:"scale_tier,omitempty"`
            	// Specifies the type of virtual machine to use for your training
            	// job's master worker. You must specify this field when `scaleTier` is set to
            	// `CUSTOM`.
            	//
            	// You can use certain Compute Engine machine types directly in this field.
            	// The following types are supported:
            	//
            	// - `n1-standard-4`
            	// - `n1-standard-8`
            	// - `n1-standard-16`
            	// - `n1-standard-32`
            	// - `n1-standard-64`
            	// - `n1-standard-96`
            	// - `n1-highmem-2`
            	// - `n1-highmem-4`
            	// - `n1-highmem-8`
            	// - `n1-highmem-16`
            	// - `n1-highmem-32`
            	// - `n1-highmem-64`
            	// - `n1-highmem-96`
            	// - `n1-highcpu-16`
            	// - `n1-highcpu-32`
            	// - `n1-highcpu-64`
            	// - `n1-highcpu-96`
            	//
            	// Alternatively, you can use the following legacy machine types:
            	//
            	// - `standard`
            	// - `large_model`
            	// - `complex_model_s`
            	// - `complex_model_m`
            	// - `complex_model_l`
            	// - `standard_gpu`
            	// - `complex_model_m_gpu`
            	// - `complex_model_l_gpu`
            	// - `standard_p100`
            	// - `complex_model_m_p100`
            	// - `standard_v100`
            	// - `large_model_v100`
            	// - `complex_model_m_v100`
            	// - `complex_model_l_v100`
            	//
            	// Finally, if you want to use a TPU for training, specify `cloud_tpu` in this
            	// field. Learn more about the [special configuration options for training
            	// with
            	// TPU](https://cloud.google.com/ai-platform/training/docs/using-tpus#configuring_a_custom_tpu_machine).
            	MasterType <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,2,opt,name=master_type,json=masterType,proto3" json:"master_type,omitempty"`
            	// Configuration (count and accelerator type) for hardware running notebook
            	// execution.
            	AcceleratorConfig *<a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_ExecutionTemplate_SchedulerAcceleratorConfig">ExecutionTemplate_SchedulerAcceleratorConfig</a> `protobuf:"bytes,3,opt,name=accelerator_config,json=acceleratorConfig,proto3" json:"accelerator_config,omitempty"`
            	// Labels for execution.
            	// If execution is scheduled, a field included will be 'nbs-scheduled'.
            	// Otherwise, it is an immediate execution, and an included field will be
            	// 'nbs-immediate'. Use fields to efficiently index between various types of
            	// executions.
            	Labels map[<a href="https://pkg.go.dev/builtin#string">string</a>]<a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,4,rep,name=labels,proto3" json:"labels,omitempty" protobuf_key:"bytes,1,opt,name=key" protobuf_val:"bytes,2,opt,name=value"`
            	// Path to the notebook file to execute.
            	// Must be in a Google Cloud Storage bucket.
            	// Format: `gs://{bucket_name}/{folder}/{notebook_file_name}`
            	// Ex: `gs://notebook_user/scheduled_notebooks/sentiment_notebook.ipynb`
            	InputNotebookFile <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,5,opt,name=input_notebook_file,json=inputNotebookFile,proto3" json:"input_notebook_file,omitempty"`
            	// Container Image URI to a DLVM
            	// Example: 'gcr.io/deeplearning-platform-release/base-cu100'
            	// More examples can be found at:
            	// https://cloud.google.com/ai-platform/deep-learning-containers/docs/choosing-container
            	ContainerImageUri <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,6,opt,name=container_image_uri,json=containerImageUri,proto3" json:"container_image_uri,omitempty"`
            	// Path to the notebook folder to write to.
            	// Must be in a Google Cloud Storage bucket path.
            	// Format: `gs://{bucket_name}/{folder}`
            	// Ex: `gs://notebook_user/scheduled_notebooks`
            	OutputNotebookFolder <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,7,opt,name=output_notebook_folder,json=outputNotebookFolder,proto3" json:"output_notebook_folder,omitempty"`
            	// Parameters to be overridden in the notebook during execution.
            	// Ref https://papermill.readthedocs.io/en/latest/usage-parameterize.html on
            	// how to specifying parameters in the input notebook and pass them here
            	// in an YAML file.
            	// Ex: `gs://notebook_user/scheduled_notebooks/sentiment_notebook_params.yaml`
            	ParamsYamlFile <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,8,opt,name=params_yaml_file,json=paramsYamlFile,proto3" json:"params_yaml_file,omitempty"`
            	// Parameters used within the 'input_notebook_file' notebook.
            	Parameters <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,9,opt,name=parameters,proto3" json:"parameters,omitempty"`
            	// The email address of a service account to use when running the execution.
            	// You must have the `iam.serviceAccounts.actAs` permission for the specified
            	// service account.
            	ServiceAccount <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,10,opt,name=service_account,json=serviceAccount,proto3" json:"service_account,omitempty"`
            	// The type of Job to be used on this execution.
            	JobType <a href="#cloud_google_com_go_notebooks_apiv1_notebookspb_ExecutionTemplate_JobType">ExecutionTemplate_JobType</a> `protobuf:"varint,11,opt,name=job_type,json=jobType,proto3,enum=google.cloud.notebooks.v1.ExecutionTemplate_JobType" json:"job_type,omitempty"`
            	// Parameters for an execution type.
            	// NOTE: There are currently no extra parameters for VertexAI jobs.
            	//
            	// Types that are valid to be assigned to JobParameters:
            	//
            	//	*ExecutionTemplate_DataprocParameters_
            	//	*ExecutionTemplate_VertexAiParameters
            	JobParameters isExecutionTemplate_JobParameters `protobuf_oneof:"job_parameters"`
            	// Name of the kernel spec to use. This must be specified if the
            	// kernel spec name on the execution target does not match the name in the
            	// input notebook file.
            	KernelSpec <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,14,opt,name=kernel_spec,json=kernelSpec,proto3" json:"kernel_spec,omitempty"`
            	// The name of a Vertex AI [Tensorboard] resource to which this execution
            	// will upload Tensorboard logs.
            	// Format:
            	// `projects/{project}/locations/{location}/tensorboards/{tensorboard}`
            	Tensorboard <a href="https://pkg.go.dev/builtin#string">string</a> `protobuf:"bytes,15,opt,name=tensorboard,proto3" json:"tensorboard,omitempty"`
            	// contains filtered or unexported fields
            }
