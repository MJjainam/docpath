      name: State_STATE_UNSPECIFIED, State_STARTING, State_PROVISIONING, State_ACTIVE, State_STOPPING, State_STOPPED, State_DELETED, State_UPGRADING, State_INITIALIZING, State_SUSPENDING, State_SUSPENDED
      id: State_STATE_UNSPECIFIED,State_STARTING,State_PROVISIONING,State_ACTIVE,State_STOPPING,State_STOPPED,State_DELETED,State_UPGRADING,State_INITIALIZING,State_SUSPENDING,State_SUSPENDED
      parent: cloud.google.com/go/notebooks/apiv2/notebookspb.State
      type: const
      langs:
        - go
      syntax:
        content: |-
            const (
            	// State is not specified.
            	State_STATE_UNSPECIFIED <a href="#cloud_google_com_go_notebooks_apiv2_notebookspb_State">State</a> = 0
            	// The control logic is starting the instance.
            	State_STARTING <a href="#cloud_google_com_go_notebooks_apiv2_notebookspb_State">State</a> = 1
            	// The control logic is installing required frameworks and registering the
            	// instance with notebook proxy
            	State_PROVISIONING <a href="#cloud_google_com_go_notebooks_apiv2_notebookspb_State">State</a> = 2
            	// The instance is running.
            	State_ACTIVE <a href="#cloud_google_com_go_notebooks_apiv2_notebookspb_State">State</a> = 3
            	// The control logic is stopping the instance.
            	State_STOPPING <a href="#cloud_google_com_go_notebooks_apiv2_notebookspb_State">State</a> = 4
            	// The instance is stopped.
            	State_STOPPED <a href="#cloud_google_com_go_notebooks_apiv2_notebookspb_State">State</a> = 5
            	// The instance is deleted.
            	State_DELETED <a href="#cloud_google_com_go_notebooks_apiv2_notebookspb_State">State</a> = 6
            	// The instance is upgrading.
            	State_UPGRADING <a href="#cloud_google_com_go_notebooks_apiv2_notebookspb_State">State</a> = 7
            	// The instance is being created.
            	State_INITIALIZING <a href="#cloud_google_com_go_notebooks_apiv2_notebookspb_State">State</a> = 8
            	// The instance is suspending.
