    - uid: cloud.google.com/go/notebooks/apiv2/notebookspb.ShieldedInstanceConfig
      name: ShieldedInstanceConfig
      id: ShieldedInstanceConfig
      summary: |
        A set of Shielded Instance options.
        See [Images using supported Shielded VM
        features](https://cloud.google.com/compute/docs/instances/modifying-shielded-vm).
        Not all combinations are valid.
      parent: cloud.google.com/go/notebooks/apiv2/notebookspb
      type: type
      langs:
        - go
      syntax:
        content: |-
            type ShieldedInstanceConfig struct {

            	// Optional. Defines whether the VM instance has Secure Boot enabled.
            	//
            	// Secure Boot helps ensure that the system only runs authentic software by
            	// verifying the digital signature of all boot components, and halting the
            	// boot process if signature verification fails. Disabled by default.
            	EnableSecureBoot <a href="https://pkg.go.dev/builtin#bool">bool</a> `protobuf:"varint,1,opt,name=enable_secure_boot,json=enableSecureBoot,proto3" json:"enable_secure_boot,omitempty"`
            	// Optional. Defines whether the VM instance has the vTPM enabled. Enabled by
            	// default.
            	EnableVtpm <a href="https://pkg.go.dev/builtin#bool">bool</a> `protobuf:"varint,2,opt,name=enable_vtpm,json=enableVtpm,proto3" json:"enable_vtpm,omitempty"`
            	// Optional. Defines whether the VM instance has integrity monitoring enabled.
            	//
            	// Enables monitoring and attestation of the boot integrity of the VM
            	// instance. The attestation is performed against the integrity policy
            	// baseline. This baseline is initially derived from the implicitly trusted
            	// boot image when the VM instance is created. Enabled by default.
            	EnableIntegrityMonitoring <a href="https://pkg.go.dev/builtin#bool">bool</a> `protobuf:"varint,3,opt,name=enable_integrity_monitoring,json=enableIntegrityMonitoring,proto3" json:"enable_integrity_monitoring,omitempty"`
            	// contains filtered or unexported fields
            }
