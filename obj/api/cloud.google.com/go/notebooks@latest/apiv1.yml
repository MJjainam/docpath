        // It will require modifications to work:
        // - It may require correct/in-range values for request initialization.
        // - It may require specifying regional endpoints when creating the service client as shown in:
        //   https://pkg.go.dev/cloud.google.com/go#hdr-Client_Options
        c, err := notebooks.NewManagedNotebookClient(ctx)
        if err != nil {
        	// TODO: Handle error.
        }
        defer c.Close()
        </pre>
        <p>The client will use your default application credentials. Clients should be reused instead of created as needed.
        The methods of Client are safe for concurrent use by multiple goroutines.
        The returned client must be Closed when it is done being used.
        <h2 id="hdr-Using_the_Client">Using the Client</h2>
        <p>The following is an example of making an API call with the newly created client, mentioned above.
        <pre class="prettyprint">req := &amp;notebookspb.CreateRuntimeRequest{
        	// TODO: Fill request struct fields.
        	// See https://pkg.go.dev/cloud.google.com/go/notebooks/apiv1/notebookspb#CreateRuntimeRequest.
        }
        op, err := c.CreateRuntime(ctx, req)
        if err != nil {
        	// TODO: Handle error.
        }

        resp, err := op.Wait(ctx)
        if err != nil {
        	// TODO: Handle error.
        }
        // TODO: Use resp.
        _ = resp
        </pre>
        <h2 id="hdr-Use_of_Context">Use of Context</h2>
        <p>The ctx passed to NewManagedNotebookClient is used for authentication requests and
        for creating the underlying connection, but is not used for subsequent calls.
        Individual methods on the client use the ctx given to them.
        <p>To close the open connection, use the Close() method.
